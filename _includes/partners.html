<div class="max-w-7xl mx-auto text-center p-4" id="partners">
  <div class="flex flex-wrap justify-center">
    {% for partner in site.partners %}
    <div class="flex-1 w-1/2 md:w-1/3 flex flex-col p-1 my-2">
      {% assign default_link = "http://" | append: partner[0] %}
      {% assign link = partner[1].link | default: default_link %}
      {% assign domain = partner[1].domain | default: partner[0] %}
      <a href="{{link}}">
        <div class="bg-contain bg-center bg-no-repeat" style="height: 3rem; background-image: url(/images/partners/{{domain}}.png)"></div>
        <div class="my-2">
        {{domain}}
        </div>
      </a>
    </div>
    {% endfor %}
  </div>
</div>
<div class="pb-1 bg-orange"></div>
